trigger:
  action_words: ["long", "initiating", "starting position", "adding"]

instrument_policy:
  prefer_options: true
  min_expiry_days: 180
  strike_policy: closest_itm_call
  fallback_to_stock_if_no_options: true

pricing_policy:
  mode: cheapest_fillable_limit
  option_spread_fraction: 0.25
  stock_buffer_pct: 0.001

sizing_policy:
  low_conviction_pct: 0.05
  high_conviction_pct: 0.10

market_hours:
  options_rth_only: true
  stock_premarket_allowed: true
  stock_premarket_start: "04:00"
  rth_start: "09:30"
  rth_end: "16:00"
  stock_afterhours_queue: true

cooldown_policy:
  enabled: true
  cooldown_minutes: 30

dedupe_policy:
  enabled: true
  key: message_fingerprint_plus_ticker_plus_action_plus_window

pricing_policy_guards:
  min_bid: 0.01
  max_spread_pct: 0.40

models:
  vision: claude-opus-4-7
  text: claude-haiku-4-5-20251001

watched_channels:
  mystic:
    auto_execute: true
  alerts:
    auto_execute: true
  trades:
    auto_execute: true
  wall-st-engine:
    auto_execute: false
  stock-talk-portfolio:
    auto_execute: false
  chat:
    auto_execute: false
  yonezu:
    auto_execute: true
  pup-danny:
    auto_execute: true
  urkel:
    auto_execute: true
  gladiator:
    auto_execute: true
  graddox:
    auto_execute: true
  phat:
    auto_execute: true
  grid:
    auto_execute: true

discord_bundle_id: "com.hnc.Discord"
telegram:
  chat_id: "434034796"
  bot_token: "replace-with-env-TELEGRAM_BOT_TOKEN"

ib_gateway:
  host: "127.0.0.1"
  port: 4002
  client_id: 1
  mode: paper
  paper_account_prefixes:
    - "DU"

execution:
  fill_wait_timeout_seconds: 30
  max_equity_price: 500.0
  reconciler_interval_seconds: 60
  walk_profile: aggressive_fast
  walk_profiles:
    cautious_fast:   [0.00, 0.02, 0.05, 0.10]
    aggressive_fast: [0.01, 0.03, 0.06, 0.10]
  reprice_interval_ms: 2500
  max_chase_pct: 0.15
