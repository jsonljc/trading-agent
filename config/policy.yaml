trigger:
  action_words: ["long", "initiating", "starting position", "adding"]

instrument_policy:
  # 180d minimum is intentional: shares-first design treats options as a
  # long-dated convex-leverage sleeve. If chains commonly fail eligibility,
  # the options leg simply records a partial_execution_reason and the shares
  # leg still fills.
  min_expiry_days: 180
  strike_policy: closest_itm_call

market_hours:
  options_rth_only: true
  stock_premarket_allowed: true
  stock_premarket_start: "04:00"
  rth_start: "09:30"
  rth_end: "16:00"
  stock_afterhours_queue: true

cooldown_policy:
  enabled: true
  cooldown_minutes: 30

dedupe_policy:
  enabled: true
  key: message_fingerprint_plus_ticker_plus_action_plus_window

pricing_policy_guards:
  min_bid: 0.01
  # (ask-bid)/mid ceiling for the options leg (was 0.40 measured wrongly vs ask).
  max_spread_pct: 0.10
  # Reject an option candidate only when OI/volume are present and below these
  # (delayed market data returns none -> fail open, gate on spread alone).
  min_open_interest: 100
  min_volume: 0

models:
  vision: claude-opus-4-7
  text: claude-haiku-4-5-20251001

watched_channels:
  # Tracked-channel registry. auto_execute lives on the trader profile.
  mystic: {}
  wallstengine: {}
  stocktalkweekly: {}

discord_bundle_id: "com.hnc.Discord"
telegram:
  chat_id: "434034796"
  bot_token: "replace-with-env-TELEGRAM_BOT_TOKEN"

ib_gateway:
  host: "127.0.0.1"
  port: 4002
  client_id: 1
  mode: paper
  paper_account_prefixes:
    - "DU"

execution:
  fill_wait_timeout_seconds: 30
  max_equity_price: 500.0
  reconciler_interval_seconds: 60
  margin_multiplier: 2.0
  options_chase_threshold_pct: 0.10
  # Marketable-limit slippage caps (limit = live_ask * (1 + cap)).
  options_slippage_cap_pct: 0.05
  shares_slippage_cap_pct: 0.01
  exit_poll_interval_seconds: 2
  trim_ladder:
    rungs:
      - threshold_pct: 0.05
        trim_pct: 0.40
      - threshold_pct: 0.10
        trim_pct: 0.40
  sizing:
    default:
      high: { shares: 0.05, options: 0.03 }
      low:  { shares: 0.03, options: 0.03 }
    per_channel:
      stocktalkweekly:
        high: { shares: 0.10, options: 0.03 }
        low:  { shares: 0.08, options: 0.03 }
      mystic:
        high: { shares: 0.08, options: 0.03 }
        low:  { shares: 0.05, options: 0.03 }

discord_extension:
  forwarder_port: 9876
  channel_id_map:
    "1229546005788098580": stocktalkweekly   # Discord channel "live-notes-portfolio" (renamed; trader still STW)
    "1217309136681832540": mystic
    "1248378121451733083": wallstengine      # Discord channel "wall-st-engine"
