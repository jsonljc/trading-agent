trigger:
  action_words: ["long", "initiating", "starting position", "adding"]

instrument_policy:
  min_expiry_days: 180
  strike_policy: closest_itm_call

market_hours:
  options_rth_only: true
  stock_premarket_allowed: true
  stock_premarket_start: "04:00"
  rth_start: "09:30"
  rth_end: "16:00"
  stock_afterhours_queue: true

cooldown_policy:
  enabled: true
  cooldown_minutes: 30

dedupe_policy:
  enabled: true
  key: message_fingerprint_plus_ticker_plus_action_plus_window

pricing_policy_guards:
  min_bid: 0.01
  max_spread_pct: 0.40

models:
  vision: claude-opus-4-7
  text: claude-haiku-4-5-20251001

watched_channels:
  # For channels routed to a trader profile in config/traders/, the per-trader
  # auto_execute flag is the source of truth — these channel-level flags must
  # match.
  mystic:
    auto_execute: true
  wall-st-engine:
    auto_execute: true
  stock-talk-portfolio:
    auto_execute: true
  alerts:
    auto_execute: true
  trades:
    auto_execute: true
  chat:
    auto_execute: false
  pup-danny:
    auto_execute: true
  urkel:
    auto_execute: true
  gladiator:
    auto_execute: true
  graddox:
    auto_execute: true
  phat:
    auto_execute: true
  grid:
    auto_execute: true

discord_bundle_id: "com.hnc.Discord"
telegram:
  chat_id: "434034796"
  bot_token: "replace-with-env-TELEGRAM_BOT_TOKEN"

ib_gateway:
  host: "127.0.0.1"
  port: 4002
  client_id: 1
  mode: paper
  paper_account_prefixes:
    - "DU"

execution:
  fill_wait_timeout_seconds: 30
  max_equity_price: 500.0
  reconciler_interval_seconds: 60
  margin_multiplier: 2.0
  options_chase_threshold_pct: 0.10
  exit_poll_interval_seconds: 2
  trim_ladder:
    rungs:
      - threshold_pct: 0.05
        trim_pct: 0.40
      - threshold_pct: 0.10
        trim_pct: 0.40
  sizing:
    default:
      high: { shares: 0.10, options: 0.05 }
      low:  { shares: 0.05, options: 0.05 }
    per_channel:
      stock-talk-portfolio:
        high: { shares: 0.20, options: 0.05 }
        low:  { shares: 0.15, options: 0.05 }
      mystic:
        high: { shares: 0.15, options: 0.05 }
        low:  { shares: 0.10, options: 0.05 }

discord_extension:
  forwarder_port: 9876
  channel_id_map:
    "1229546005788098580": stocktalkweekly
    "1217309136681832540": mystic
    "1248378121451733083": wallstengine
    "1221605346305642558": pup-danny
    "1151611275709788253": urkel
