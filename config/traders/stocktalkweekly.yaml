handle: stocktalkweekly
display_name: Stock Talk Weekly
discord_author_pattern: "Stock Talk Weekly"
alert_mention: "@Stock Talk Weekly - Alerts"
require_alert_mention: true
bot_authors_to_skip: []
auto_execute: true
size_in_message: true
prefer_message_size: true
classifier_model: claude-haiku-4-5
availability_phrases: ["off the grid", "passover", "on vacation"]
conviction_examples:
  - msg: "This will join the 'Prospective Positions' group with a small 1% weighting @ $41.22"
    bucket: HIGH
    why: "STW actionable entry — every STW entry is sized HIGH per user directive; the 1% the trader put in is informational only, sizing is driven by our per-channel HIGH allocation"
  - msg: "names that I want to upsize when the opportunity arises"
    bucket: SKIP
    why: "intent to upsize later, not an entry now"
  - msg: "Fully closed remainder of position. Too much uncertainty around shipping insurance & fuel prices in this environment ... lowest conviction name in the portfolio"
    bucket: SKIP
    why: "exit, not entry"
  - msg: "PORTFOLIO UPDATE - 18 POSITIONS"
    bucket: SKIP
    why: "ledger snapshot"
  - msg: "Yet another intraday fade in the market with $SPY $QQQ flushing red. Market can't get off the mat with these oil concerns."
    bucket: SKIP
    why: "macro commentary"
  - msg: "OPENING $SEI (SOLARIS ENERGY INFRASTRUCTURE) Ahead of Monday earnings. Mcap: $4B Short Interest: 23%. GE Vernova reported a blockuster Q1 and the read-through is strong. Strong sympathy to $GEV and a legitimate behind-the-meter power play."
    bucket: HIGH
    why: "OPENING entry with structured thesis (catalyst + cross-read + theme), STW's standard high-conviction format"
  - msg: "Pushing $P, this was a timely upsize for us"
    bucket: SKIP
    why: "past-tense self-congratulation ('was a timely upsize'), references an earlier trade — not a new entry now"
  - msg: "Raised weighting slightly on $P from 0.5% to a full 1% -- same calls as before"
    bucket: SKIP
    why: "trivial 0.5pp weight bump with 'same calls as before' — minor adjustment, not a fresh conviction entry"
  - msg: "Upsized $LUMN $7C for Jan 2027 (paid for by rolling out the other strikes) so net weighting remains largely the same"
    bucket: SKIP
    why: "options roll explicitly stating 'net weighting remains largely the same' — net exposure unchanged, not a new entry"
  - msg: "ADEIA $ADEA VALUABLE SEMICONDUCTOR IP. Adeia owns the foundational IP behind hybrid bonding ... blue-chip customer adoption (SK Hynix, Micron, AMD, Samsung, SanDisk) ... 12x EV/EBITDA and 20x FCF ... I've taken a 2% position in the $30C for June @ $1.50 and the $30C for September @ $3.58 avg."
    bucket: HIGH
    why: "structured multi-pillar thesis (moat + customer validation + valuation) plus explicit fresh 2% position with sizing detail — STW's standard high-conviction format"
  - msg: "$FIVN compiling my notes now, will post DD shortly @Stock Talk Weekly - Alerts"
    bucket: HIGH
    why: "STW's pre-DD entry alert: ticker + 'compiling notes' / 'will post DD shortly' means he's entered now and the thesis post follows separately. Fire HIGH — the SameDayDedupGate prevents the follow-up DD post from firing a second buy on the same ticker"
